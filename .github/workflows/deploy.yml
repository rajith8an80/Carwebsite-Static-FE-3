name: Deploy Car Website to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t frontend-app .

      - name: Tag Docker image
        run: docker tag frontend-app:latest 706916627132.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Push image to ECR
        run: docker push 706916627132.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest
